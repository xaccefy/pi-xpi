name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref so queued commits don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Biome CI mode: non-interactive, fails on diagnostics at the chosen level.
      # Currently a soft gate (continue-on-error) because 3 pre-existing lint errors
      # exist in the codebase; promote to a required gate after they are fixed.
      - name: Lint (Biome)
        run: bunx @biomejs/biome ci . --diagnostic-level=error
        continue-on-error: true

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --isolate
        timeout-minutes: 10
