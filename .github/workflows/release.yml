name: Release Suite

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release / Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: bun test

      - name: Verify NPM Token
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is empty! Please configure it in your repository settings under Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          else
            echo "NPM_TOKEN is set (length: ${#NPM_TOKEN})"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        run: npm run publish:all
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
