name: Release

# Manual trigger. Bumps all workspace packages + umbrella, runs the full
# verify suite, publishes to npm, tags vX.Y.Z, and pushes. Requires NPM_TOKEN.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --isolate
        timeout-minutes: 10

      - name: Version bump (${{ inputs.bump }})
        run: bun run version:${{ inputs.bump }}

      - name: Stamp changelogs
        run: node scripts/stamp-changelogs.mjs "$(node -p "require('./package.json').version")"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "$RUNNER_TEMP/.npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc" >> "$GITHUB_ENV"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm auth
        run: 'echo "Authenticated to npm as: $(npm whoami)"'

      - name: Publish all workspaces + umbrella
        run: |
          set -euo pipefail
          npm publish -ws --access public
          npm publish --access public

      - name: Commit version bumps, tag, and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="$(node -p "require('./package.json').version")"
          git add package.json packages/*/package.json
          # CHANGELOG.md files may not exist in every package yet — add what exists.
          find . -maxdepth 2 -name CHANGELOG.md -not -path "./node_modules/*" -print0 | xargs -0 -r git add --
          if git diff --cached --quiet; then
            echo "No version file changes to commit"
          else
            git commit -m "chore: release v${VERSION}"
          fi
          git tag "v${VERSION}" || true
          # checkout leaves us on a detached HEAD — name the dst ref explicitly.
          git push origin HEAD:main
          git push origin "v${VERSION}"
