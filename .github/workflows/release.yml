name: Release

# Manual trigger. Bumps versions (patch/minor/major) using the repo's existing
# version scripts, publishes every workspace + the umbrella package, then commits
# the version bumps back. Requires NPM_TOKEN in repo secrets.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version bump (${{ inputs.bump }})
        run: bun run version:${{ inputs.bump }}

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "${{ github.workspace }}/.npmrc"
          echo "NPM_CONFIG_USERCONFIG=${{ github.workspace }}/.npmrc" >> "$GITHUB_ENV"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm auth (diagnostic)
        run: echo "Authenticated to npm as: $(npm whoami)"

      - name: Publish to npm
        run: npm publish -ws --access public && npm publish --access public

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ inputs.bump }}" || echo "nothing to commit"
          git push
